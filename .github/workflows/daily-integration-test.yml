name: Daily Integration Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  integration-test:
    name: Run Integration Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clockify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SERVICE_POSTGRES_HOST: localhost
      SERVICE_POSTGRES_PORT: 5432
      SERVICE_REDIS_HOST: localhost
      SERVICE_REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.INTEGRATION_GITHUB_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run integration tests
        working-directory: api
        run: npm run test:integration

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-${{ github.run_id }}
          path: DailyIntegrationTestResult/
          retention-days: 30
