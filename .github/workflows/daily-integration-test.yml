name: Daily Integration Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  integration-test:
    name: Run Integration Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clockify
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run integration checks
        working-directory: api
        env:
          SERVICE_POSTGRES_HOST: localhost
          SERVICE_POSTGRES_PORT: '5432'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clockify
          SERVICE_REDIS_HOST: localhost
          SERVICE_REDIS_PORT: '6379'
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.INTEGRATION_GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run test:integration

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-${{ github.run_id }}
          path: DailyIntegrationTestResult/
          retention-days: 30
